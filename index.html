<script>
document.addEventListener('DOMContentLoaded', () => {
    // 1. Countdown Timer (Set to 1 Second) & Redirect Logic
    let timeLeft = 1;  
    const timerDisplay = document.getElementById('timer-display');
    const telegramLink = "https://t.me/+B166Epo7qAVhY2U1";

    const countdownInterval = setInterval(() => {
        timeLeft--;
        
        if (timeLeft >= 0) {
            timerDisplay.textContent = `00:00:0${timeLeft}`;
        }

        // Redirect logic
        if (timeLeft <= 0) {
            clearInterval(countdownInterval);
            
            // Wait 1 second exactly after hitting 0, then redirect
            setTimeout(() => {
                window.location.href = telegramLink;
            }, 1000); 
        }
    }, 1000);

    // 2. Popup Logic
    const modal = document.getElementById('videoPopup');
    const closeBtn = document.querySelector('.close-btn');

    closeBtn.addEventListener('click', () => {
        modal.style.display = 'none';
        const iframe = modal.querySelector('iframe');
        iframe.src = iframe.src; 
    });

    window.addEventListener('click', (e) => {
        if (e.target === modal) {
            modal.style.display = 'none';
        }
    });
});
